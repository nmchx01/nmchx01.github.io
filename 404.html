<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#050508" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <title>Página no encontrada — Nicolás Monroy Chaparro</title>
  <meta name="description" content="La página solicitada no existe en el portafolio de Nicolás Monroy Chaparro." />
  <style>
    :root{color-scheme:dark;--bg:#050508;--cyan:#00d4f5;--text:#b0b8c8;--white:#f4f7fb}
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;display:grid;place-items:center;padding:24px;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",sans-serif}
    main{width:min(620px,100%);text-align:center;padding:clamp(32px,8vw,64px);border:1px solid rgba(0,212,245,.18);border-radius:24px;background:rgba(255,255,255,.03);box-shadow:0 30px 100px rgba(0,0,0,.45)}
    .code{display:block;margin-bottom:12px;color:var(--cyan);font-family:ui-monospace,"Cascadia Code",monospace;font-size:clamp(4rem,18vw,8rem);font-weight:800;line-height:1}
    h1{margin-bottom:14px;color:var(--white);font-size:clamp(1.5rem,5vw,2.3rem)}
    p{margin:0 auto 28px;max-width:46ch;line-height:1.7}
    a{display:inline-flex;padding:11px 22px;border:1px solid var(--cyan);border-radius:999px;color:var(--cyan);font-weight:700;text-decoration:none;transition:background .2s,color .2s}
    a:hover,a:focus-visible{background:var(--cyan);color:var(--bg);outline:none}
  </style>
</head>
<body>
  <main>
    <span class="code" aria-hidden="true">404</span>
    <h1>Página no encontrada</h1>
    <p>La dirección puede estar incompleta o la página pudo haberse movido.</p>
    <a href="/">Volver al portafolio</a>
  </main>
</body>
</html>
